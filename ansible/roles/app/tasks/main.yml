- name: Launch app
  community.docker.docker_container:
    name: backend
    image: akpablin/tp-devops-simple-api
    networks:
      - name: my-network
    env:
      DB_URL: "jdbc:postgresql://my-database:5432/db"
      DB_USERNAME: "usr"
      DB_PASSWORD: "pwd"
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
